<mat-toolbar class="custom-navbar">
  <mat-toolbar-row>
    <div class="logo-container">
      <span class="logo-skill">Skill</span><span class="logo-swap">Swap</span>
    </div>

    <div class="mat-spacer"></div>

    <nav class="nav-links">
      @for (option of options; track option.label) {
        <a mat-button [routerLink]="option.link" routerLinkActive="active-link" class="nav-item">
          {{ option.label | translate }}
        </a>
      }
    </nav>

    <div class="nav-actions">
      <button mat-icon-button class="action-btn">
        <mat-icon>search</mat-icon>
      </button>

      <button mat-icon-button class="action-btn badge-btn">
        <mat-icon>notifications</mat-icon>
        <span class="badge"></span>
      </button>

      <app-language-switcher></app-language-switcher>

      <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="User Avatar" class="user-avatar">

      <button mat-flat-button class="logout-btn">
        Cerrar Sesión
      </button>
    </div>
  </mat-toolbar-row>
</mat-toolbar>

<main class="main-container">
  <router-outlet></router-outlet>
</main>

<app-footer-content></app-footer-content>
